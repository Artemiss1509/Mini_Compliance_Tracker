<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Task Manager</title>
</head>
<body>

  <div class="sidebar">
    <h2>Clients</h2>
    <button id="add-client-btn">+ Add Client</button>
    <div id="client-list">
      <!-- <div class="client selected">Client A</div>
      <div class="client">Client B</div> -->
      <button class="client">Client A</button>
      <button class="client">Client B</button>
      
    </div>
  </div>
  <div class="modal-overlay" id="client-modal" style="display: none;">
    <div class="modal">
      <h3>Add New Client</h3>
      <form id="add-client-form">
        <label for="company-name">Company Name</label>
        <input type="text" id="clientname-input" placeholder="Enter company name" />
        <label for="country">Country</label>
        <input type="text" id="client-country-input" placeholder="Enter country" />
        <label for="entity">Entity Type</label>
        <input type="text" id="client-entity-input" placeholder="Enter entity type" />
        <button type="submit">Add Client</button>
        
      </form>
      <div class="modal-actions">
        <button id="close-client-modal">Cancel</button>
      </div>
    </div>
  </div>

  <div class="main">

    <h2>Tasks</h2>

    <div class="filters">
      <label>Status:</label>
      <select id="status-filter">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
        <option value="overdue">Overdue</option>
      </select>

      <select id="priority">
        <option value="all">All Priorities</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <label>Category:</label>
      <select id="category-filter">
        <option value="all">All</option>
        <option value="comp">Compliance</option>
        <option value="legal">Legal</option>
      </select>
    </div>

    <div class="add-task">
        <form id="add-task-form">
            <label for="title">Title</label>
            <input type="text" placeholder="Title" />
            <label for="description">Description</label>
            <input type="text" placeholder="Description" />
            <label for="priority">Priority</label>
            <select>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <label for="category">Category</label>
            <select>
                <option value="comp">Compliance</option>
                <option value="legal">Legal</option>
            </select>
            <label for="status">Status</label>
            <select>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
                <option value="overdue">Overdue</option>
            </select>
            <label for="due-date">Due Date</label>
            <input type="date" />
            <button type="submit">Add Task</button>
        </form>
    </div>

    <!-- Task List -->
    <div id="task-list">

    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
